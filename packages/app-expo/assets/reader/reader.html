<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>ReadAny Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-text-size-adjust: none;
      -webkit-user-select: text;
      user-select: text;
      background: var(--bg, #1c1c1e);
      color: var(--fg, #e8e8ed);
    }

    #reader-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    #loading.hidden {
      display: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-size: 14px;
      color: var(--muted, #7c7c82);
    }

    .error-text {
      font-size: 14px;
      color: #e53935;
      text-align: center;
      padding: 20px;
    }

    /* Suppress iOS selection callout */
    * {
      -webkit-touch-callout: none !important;
    }

    ::selection {
      background: rgba(250, 204, 21, 0.4) !important;
    }
  </style>
</head>

<body>
  <div id="reader-container">
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading...</div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // ReadAny WebView Reader Bridge
    // Communicates with React Native via postMessage
    // ═══════════════════════════════════════════════════════════════

    const RN = window.ReactNativeWebView;
    function postToRN(type, data) {
      if (RN) RN.postMessage(JSON.stringify({ type, ...data }));
    }

    // State
    let view = null;
    let currentBook = null;
    let searchGenerator = null;
    let searchResults = [];
    let searchIndex = 0;
    // Track current theme colors and last renderer styles for theme injection
    let currentThemeColors = { bg: '#1c1c1e', fg: '#e8e8ed', muted: '#7c7c82', primary: '#3b82f6' };
    let lastRendererStyles = '';

    // Store user annotations for re-rendering on page change
    const userAnnotations = new Map();

    // Note tooltip registry: per-doc WeakMap of cfi -> { range, note }
    const docNoteRegistries = new WeakMap();

    function registerNoteRange(doc, cfi, range, note) {
      let registry = docNoteRegistries.get(doc);
      if (!registry) {
        registry = new Map();
        docNoteRegistries.set(doc, registry);
      }
      registry.set(cfi, { range, note });
    }

    function unregisterNoteRange(doc, cfi) {
      const registry = docNoteRegistries.get(doc);
      if (registry) registry.delete(cfi);
    }

    function isPointInNoteRange(doc, x, y) {
      const registry = docNoteRegistries.get(doc);
      if (!registry || registry.size === 0) return null;
      const pad = 6;
      for (const [cfi, entry] of registry) {
        for (const rect of entry.range.getClientRects()) {
          if (x >= rect.left - pad && x <= rect.right + pad &&
              y >= rect.top - pad && y <= rect.bottom + pad + 4) {
            return { cfi, note: entry.note, range: entry.range };
          }
        }
      }
      return null;
    }

    // Attach long-press note tooltip detection to each doc
    function attachNoteLongPress(doc) {
      if (doc.__readany_noteLongPress) return;
      doc.__readany_noteLongPress = true;

      const LONG_PRESS_MS = 400;
      let timer = null;
      let startX = 0, startY = 0;

      doc.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;

        timer = setTimeout(() => {
          timer = null;
          const hit = isPointInNoteRange(doc, startX, startY);
          if (!hit) return;

          // Prevent subsequent click / show-annotation
          e.preventDefault && e.preventDefault();

          const rect = hit.range.getBoundingClientRect();
          const iframe = doc.defaultView && doc.defaultView.frameElement;
          const iframeRect = iframe ? iframe.getBoundingClientRect() : { left: 0, top: 0 };
          postToRN('note-tooltip', {
            cfi: hit.cfi,
            note: hit.note,
            position: {
              x: iframeRect.left + rect.left + rect.width / 2,
              y: iframeRect.top + rect.top - 8,
              selectionTop: iframeRect.top + rect.top,
              selectionBottom: iframeRect.top + rect.bottom,
            },
          });
        }, LONG_PRESS_MS);
      }, { passive: false });

      doc.addEventListener('touchmove', (e) => {
        if (!timer) return;
        const touch = e.touches[0];
        if (Math.abs(touch.clientX - startX) > 10 || Math.abs(touch.clientY - startY) > 10) {
          clearTimeout(timer);
          timer = null;
        }
      }, { passive: true });

      doc.addEventListener('touchend', () => {
        if (timer) { clearTimeout(timer); timer = null; }
      }, { passive: true });

      doc.addEventListener('touchcancel', () => {
        if (timer) { clearTimeout(timer); timer = null; }
      }, { passive: true });
    }

    // ─── Message handler from React Native ───
    window.addEventListener('message', async (e) => {
      try {
        const msg = JSON.parse(e.data);
        await handleCommand(msg);
      } catch (err) {
        console.error('[WebView] Error in message handler:', err);
        postToRN('error', { message: String(err) });
      }
    });

    document.addEventListener('message', async (e) => {
      try {
        const msg = JSON.parse(e.data);
        await handleCommand(msg);
      } catch (err) {
        console.error('[WebView] Error in iOS message handler:', err);
        postToRN('error', { message: String(err) });
      }
    });

    async function handleCommand(msg) {
      switch (msg.type) {
        case 'openBook':
          await openBook(msg);
          break;
        case 'goNext':
          if (view) await view.next();
          break;
        case 'goPrev':
          if (view) await view.prev();
          break;
        case 'goToFraction':
          if (view && msg.fraction != null) await view.goToFraction(msg.fraction);
          break;
        case 'goToHref':
          if (view && msg.href) await view.goTo(msg.href);
          break;
        case 'goToCFI':
          if (view && msg.cfi) await view.goTo(msg.cfi);
          break;
        case 'search':
          await handleSearch(msg.query);
          break;
        case 'clearSearch':
          if (view) view.clearSearch();
          searchResults = [];
          searchIndex = 0;
          break;
        case 'navigateSearch':
          if (msg.index != null) navigateToSearchResult(msg.index);
          break;
        case 'addAnnotation':
          if (view && msg.annotation) {
            // Don't store flash highlights in userAnnotations
            if (!msg.annotation.flash && !(msg.annotation.value && msg.annotation.value.startsWith('flash-'))) {
              userAnnotations.set(msg.annotation.value, msg.annotation);
            }
            await view.addAnnotation(msg.annotation);
          }
          break;
        case 'removeAnnotation':
          if (view && msg.annotation) {
            await view.deleteAnnotation(msg.annotation);
            // Don't delete from userAnnotations if it's a flash highlight
            if (!msg.annotation.flash && !(msg.annotation.value && msg.annotation.value.startsWith('flash-'))) {
              userAnnotations.delete(msg.annotation.value);
            }
          }
          break;
        case 'applySettings':
          if (view && msg.settings) applySettings(msg.settings);
          break;
        case 'setThemeColors':
          if (msg.colors) setThemeColors(msg.colors);
          break;
        case 'extractChapters':
          await handleExtractChapters();
          break;
        case 'getChapterParagraphs':
          handleGetChapterParagraphs();
          break;
        case 'injectChapterTranslations':
          handleInjectChapterTranslations(msg.results || []);
          break;
        case 'removeChapterTranslations':
          handleRemoveChapterTranslations();
          break;
      }
    }

    // ─── Book loading ───
    async function openBook(msg) {
      const container = document.getElementById('reader-container');
      const loading = document.getElementById('loading');

      try {
        let file;
        if (msg.base64) {
          const binary = atob(msg.base64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          file = new File([bytes], msg.fileName || 'book.epub', {
            type: msg.mimeType || 'application/epub+zip'
          });
        } else if (msg.uri) {
          const res = await fetch(msg.uri);
          if (!res.ok) throw new Error(`Failed to fetch: ${res.status}`);
          const blob = await res.blob();
          file = new File([blob], msg.fileName || 'book.epub');
        } else {
          throw new Error('No book data provided');
        }

        const book = await makeBook(file);
        currentBook = book;

        const el = document.createElement('foliate-view');
        el.style.width = '100%';
        el.style.height = '100%';

        el.addEventListener('load', (e) => {
          const { doc, index } = e.detail;
          loading.classList.add('hidden');
          applyDocStyles(doc);
          attachTapListener(doc);
          attachSelectionListener(doc);
          attachNoteLongPress(doc);
          // Re-add all user annotations for this page
          // foliate-view will only render those that belong to current section
          for (const [cfi, annotation] of userAnnotations) {
            view.addAnnotation(annotation).catch(err => {
              // Ignore errors for annotations not on current page
            });
          }
          postToRN('loaded', {});
        });

        var snippetTimer = null;
        el.addEventListener('relocate', (e) => {
          const detail = e.detail;
          postToRN('relocate', {
            fraction: detail.fraction,
            section: detail.section,
            location: detail.location,
            tocItem: detail.tocItem,
            pageItem: detail.pageItem,
            cfi: detail.cfi,
          });
          // Extract text after page render settles
          if (snippetTimer) clearTimeout(snippetTimer);
          snippetTimer = setTimeout(() => {
            var snippet = getVisibleTextSnippet(80);
            if (snippet) postToRN('pageSnippet', { textSnippet: snippet });
          }, 300);
        });

        el.addEventListener('draw-annotation', (e) => {
          const { draw, annotation, doc, range } = e.detail;
          if (!draw || !annotation) return;
          console.log('[draw-annotation] annotation:', JSON.stringify(annotation));
          const color = annotation.color || 'yellow';
          const colorMap = {
            red: 'rgba(248, 113, 113, 0.4)',
            yellow: 'rgba(250, 204, 21, 0.4)',
            green: 'rgba(74, 222, 128, 0.4)',
            blue: 'rgba(96, 165, 250, 0.4)',
            pink: 'rgba(236, 72, 153, 0.4)',
            violet: 'rgba(167, 139, 250, 0.4)',
            orange: 'rgba(251, 146, 60, 0.5)',
          };
          
          if (annotation.note) {
            console.log('[draw-annotation] has note:', annotation.note);
            // Draw both highlight and squiggly underline for notes
            draw(Overlayer.highlight, { color: colorMap[color] || colorMap.yellow });
            draw(Overlayer.squiggly, { color: '#000000', width: 1.5 });
            // Register for long-press tooltip
            if (doc && range && annotation.value) {
              registerNoteRange(doc, annotation.value, range, annotation.note);
              console.log('[draw-annotation] registered note range for:', annotation.value);
            }
          } else {
            draw(Overlayer.highlight, { color: colorMap[color] || colorMap.yellow });
            // Remove stale tooltip registration if note was removed
            if (doc && annotation.value) {
              unregisterNoteRange(doc, annotation.value);
            }
          }
        });

        el.addEventListener('delete-annotation', () => { /* no-op */ });

        el.addEventListener('show-annotation', (e) => {
          const { value, index, range } = e.detail;
          if (!value || !range) return;
          const rect = range.getBoundingClientRect();
          const iframe = range.startContainer.ownerDocument?.defaultView?.frameElement;
          const iframeRect = iframe ? iframe.getBoundingClientRect() : { left: 0, top: 0 };
          postToRN('show-annotation', {
            value,
            position: {
              x: iframeRect.left + rect.left + rect.width / 2,
              y: iframeRect.top + rect.top - 8,
              selectionTop: iframeRect.top + rect.top,
              selectionBottom: iframeRect.top + rect.bottom,
            },
          });
        });

        container.appendChild(el);
        view = el;

        await el.open(book);

        // Set search indicator color (use primary theme color instead of red)
        if (el.setSearchIndicator) {
          const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary')?.trim() || '#3b82f6';
          el.setSearchIndicator('outline', { color: primaryColor });
        }

        if (book.toc) {
          postToRN('toc', { items: convertTOC(book.toc) });
        }

        const renderer = el.renderer;
        if (renderer && !el.isFixedLayout) {
          renderer.setAttribute('max-column-count', '1');
          renderer.setAttribute('max-block-size', '100%');
          renderer.setAttribute('max-inline-size', '100%');
          renderer.setAttribute('animated', '');
          // Default gap/margin
          const margin = msg.pageMargin || 16;
          const gapPercent = Math.max(1, Math.round((margin / 393) * 100));
          renderer.setAttribute('gap', gapPercent + '%');
          renderer.setAttribute('margin', margin + 'px');
        }

        if (msg.lastLocation) {
          try {
            await el.init({ lastLocation: msg.lastLocation });
          } catch (err) {
            console.warn('[WebView] Failed to init with lastLocation, going to start:', err);
            await el.goToFraction(0);
          }
        } else {
          await el.goToFraction(0);
        }

      } catch (err) {
        console.error('[WebView] Error in openBook:', err);
        loading.innerHTML = '<div class="error-text">' + escapeHtml(String(err)) + '</div>';
        postToRN('error', { message: String(err) });
      }
    }

    // ─── Search ───
    async function handleSearch(query) {
      if (!view || !query) return;
      searchResults = [];
      searchIndex = 0;

      try {
        const iter = view.search({ query });
        let totalResults = 0;
        for await (const result of iter) {
          if (result === 'done') break;
          if (result.subitems) {
            totalResults += result.subitems.length;
            for (const sub of result.subitems) {
              searchResults.push(sub);
            }
          } else if (result.cfi) {
            totalResults++;
            searchResults.push(result);
          }
          if (result.progress != null) {
            postToRN('searchProgress', { progress: result.progress });
          }
        }
        postToRN('searchComplete', { count: totalResults });
        // Navigate to first result
        if (searchResults.length > 0) {
          await view.goTo(searchResults[0].cfi);
          postToRN('searchResult', { index: 0, count: totalResults });
        }
      } catch (err) {
        postToRN('error', { message: 'Search failed: ' + String(err) });
      }
    }

    async function navigateToSearchResult(index) {
      if (index < 0 || index >= searchResults.length) return;
      searchIndex = index;
      try {
        await view.goTo(searchResults[index].cfi);
        postToRN('searchResult', { index, count: searchResults.length });
      } catch (err) {
        postToRN('error', { message: 'Navigate search failed: ' + String(err) });
      }
    }

    // ─── Settings ───
    function applySettings(settings) {
      if (!view || !view.renderer) return;
      const renderer = view.renderer;

      if (settings.fontSize || settings.lineHeight || settings.fontTheme || settings.paragraphSpacing) {
        const fontThemes = {
          default: { cjk: 'system-ui', serif: '-apple-system' },
          classic: { cjk: 'STSong', serif: 'Georgia' },
          modern: { cjk: 'PingFang SC', serif: 'Helvetica Neue' },
          elegant: { cjk: 'STKaiti', serif: 'Palatino' },
          literary: { cjk: 'STFangsong', serif: 'Baskerville' },
        };

        const theme = fontThemes[settings.fontTheme] || fontThemes.default;
        const fontFamily = "'" + theme.cjk + "', '" + theme.serif + "', serif";
        const fSize = settings.fontSize || 16;
        const lh = settings.lineHeight || 1.6;
        const ps = settings.paragraphSpacing || 8;

        const baseStyles = `
          html, body {
            font-family: ${fontFamily} !important;
            font-size: ${fSize}px !important;
            -webkit-text-size-adjust: none;
          }
          p, div, blockquote, li, span, h1, h2, h3, h4, h5, h6 {
            font-family: ${fontFamily} !important;
            line-height: ${lh} !important;
          }
          p { margin-top: ${ps}px !important; margin-bottom: ${ps}px !important; }
          img, svg { max-width: 100% !important; height: auto !important; }
        `;

        // Save base styles and inject with current theme colors
        lastRendererStyles = baseStyles;
        const themedStyles = injectThemeIntoStyles(baseStyles, currentThemeColors.bg, currentThemeColors.fg, currentThemeColors.primary);
        renderer.setStyles(themedStyles);
      }

      if (settings.pageMargin != null) {
        const margin = settings.pageMargin;
        const gapPercent = Math.max(1, Math.round((margin / 393) * 100));
        renderer.setAttribute('gap', gapPercent + '%');
        renderer.setAttribute('margin', margin + 'px');
      }

      if (settings.viewMode) {
        if (settings.viewMode === 'scroll') {
          renderer.setAttribute('flow', 'scrolled');
          renderer.setAttribute('max-inline-size', '9999px');
        } else {
          renderer.removeAttribute('flow');
          renderer.setAttribute('max-inline-size', '100%');
        }
      }
    }

    function setThemeColors(colors) {
      const bg = colors.background || '#1c1c1e';
      const fg = colors.foreground || '#e8e8ed';
      const muted = colors.muted || '#7c7c82';
      const primary = colors.primary || '#3b82f6';

      // Store current theme colors globally for applySettings to use
      currentThemeColors = { bg, fg, muted, primary };

      document.documentElement.style.setProperty('--bg', bg);
      document.documentElement.style.setProperty('--fg', fg);
      document.documentElement.style.setProperty('--muted', muted);
      document.documentElement.style.setProperty('--primary', primary);
      document.body.style.backgroundColor = bg;
      document.body.style.color = fg;

      // Inject theme colors into iframe via renderer.setStyles
      // This is critical for dark mode — without this, EPUB content stays black text
      if (view && view.renderer && view.renderer.setStyles) {
        const currentStyles = lastRendererStyles || '';
        const themedStyles = injectThemeIntoStyles(currentStyles, bg, fg, primary);
        view.renderer.setStyles(themedStyles);
      }

      // Update search indicator color if view is ready
      if (view && view.setSearchIndicator) {
        view.setSearchIndicator('outline', { color: primary });
      }
    }

    // Helper: inject theme colors into a renderer styles string
    function injectThemeIntoStyles(baseStyles, bg, fg, primary) {
      // Remove any previous theme color rules we injected
      const cleaned = baseStyles.replace(/\/\* __theme_colors__ \*\/[\s\S]*?\/\* __end_theme_colors__ \*\//g, '');
      const themeBlock = `/* __theme_colors__ */
html, body {
  background-color: ${bg} !important;
  color: ${fg} !important;
}
p, div, span, blockquote, li, dd, dt, h1, h2, h3, h4, h5, h6, td, th, caption, figcaption, label, a {
  color: inherit !important;
}
a { color: ${primary} !important; }
::selection { background: rgba(59, 130, 246, 0.3) !important; }
/* __end_theme_colors__ */`;
      return themeBlock + '\n' + cleaned;
    }

    // ─── Document styles ───
    function applyDocStyles(doc) {
      for (const img of doc.querySelectorAll('img')) {
        img.style.maxWidth = '100%';
        img.style.height = 'auto';
      }
      const style = doc.createElement('style');
      const { bg, fg, primary } = currentThemeColors;
      style.textContent = `
        * { -webkit-touch-callout: none !important; -webkit-user-select: text !important; user-select: text !important; }
        html, body { background-color: ${bg} !important; color: ${fg} !important; }
        p, div, span, blockquote, li, dd, dt, h1, h2, h3, h4, h5, h6, td, th, caption, figcaption, label { color: inherit !important; }
        a { color: ${primary} !important; }
        ::selection { background: rgba(250, 204, 21, 0.4) !important; }
      `;
      doc.head.appendChild(style);
      doc.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); return false; }, true);
    }

    // ─── Tap detection ───
    // Three-zone layout (inspired by readest):
    //   Left 37.5%  → previous page
    //   Center 25%  → toggle menu bar
    //   Right 37.5% → next page
    function attachTapListener(doc) {
      if (doc.__readany_tap) return;
      doc.__readany_tap = true;

      const LONG_HOLD_MS = 500;
      let holdTimer = null;

      doc.addEventListener('touchstart', () => {
        holdTimer = setTimeout(() => { holdTimer = null; }, LONG_HOLD_MS);
      }, { passive: true });

      doc.addEventListener('click', (e) => {
        if (!holdTimer) return;
        clearTimeout(holdTimer);
        holdTimer = null;

        const target = e.target;
        if (target && target.closest && target.closest('a[href], audio, video, button, input, select, textarea')) return;

        const sel = doc.getSelection();
        if (sel && !sel.isCollapsed && sel.toString().trim().length > 0) return;

        let viewW;
        try { viewW = window.top.innerWidth || window.innerWidth; } catch { viewW = window.innerWidth; }
        const iframe = doc.defaultView && doc.defaultView.frameElement;
        const iframeLeft = iframe ? iframe.getBoundingClientRect().left : 0;
        const viewportX = e.clientX + iframeLeft;
        const normalizedX = ((viewportX % viewW) + viewW) % viewW;

        const centerStart = viewW * 0.375;
        const centerEnd = viewW * 0.625;

        if (normalizedX < centerStart) {
          // Left zone → previous page
          if (view) view.prev();
        } else if (normalizedX > centerEnd) {
          // Right zone → next page
          if (view) view.next();
        } else {
          // Center zone → toggle menu
          postToRN('tap', {});
        }
      });
    }

    // ─── Selection detection ───
    function attachSelectionListener(doc) {
      if (doc.__readany_selection) return;
      doc.__readany_selection = true;

      let selTimer = null;
      let iosHackPending = false;

      doc.addEventListener('touchend', () => {
        setTimeout(() => {
          if (iosHackPending) return;
          const sel = doc.getSelection();
          if (!sel || sel.isCollapsed || !sel.toString().trim() || !sel.rangeCount) return;
          const range = sel.getRangeAt(0);
          // iOS hack: remove and re-add to dismiss system menu
          iosHackPending = true;
          doc.__readany_isJiggling = true;
          sel.removeAllRanges();
          setTimeout(() => {
            sel.addRange(range);
            doc.__readany_isJiggling = false;
            iosHackPending = false;
            emitSelection(doc, sel, range);
          }, 30);
        }, 50);
      }, { passive: true });

      doc.addEventListener('selectionchange', () => {
        if (doc.__readany_isJiggling) return;
        if (iosHackPending) return;
        if (selTimer) clearTimeout(selTimer);
        selTimer = setTimeout(() => {
          const sel = doc.getSelection();
          if (!sel || sel.isCollapsed || !sel.toString().trim()) {
            postToRN('selectionCleared', {});
            return;
          }
          if (!sel.rangeCount) return;
          const range = sel.getRangeAt(0);
          emitSelection(doc, sel, range);
        }, 300);
      });
    }

    function emitSelection(doc, sel, range) {
      const text = sel.toString().trim();
      if (!text) return;

      const rect = range.getBoundingClientRect();
      const iframe = doc.defaultView && doc.defaultView.frameElement;
      const iframeRect = iframe ? iframe.getBoundingClientRect() : { left: 0, top: 0 };

      let cfi = '';
      try {
        if (view && view.getCFI) {
          const contents = view.renderer && view.renderer.getContents ? view.renderer.getContents() : [];
          const found = contents.find(c => c.doc === doc);
          if (found) cfi = view.getCFI(found.index, range) || '';
        }
      } catch { /* ignore */ }

      postToRN('selection', {
        text,
        cfi,
        position: {
          x: iframeRect.left + rect.left + rect.width / 2,
          y: iframeRect.top + rect.top - 8,
          selectionTop: iframeRect.top + rect.top,
          selectionBottom: iframeRect.top + rect.bottom,
        },
      });
    }

    // ─── TOC conversion ───
    function convertTOC(toc, level) {
      if (!toc) return [];
      level = level || 0;
      return toc.map(function (item, i) {
        return {
          id: String(item.id != null ? item.id : 'toc-' + level + '-' + i),
          title: item.label || 'Chapter ' + (i + 1),
          level: level,
          href: item.href,
          subitems: item.subitems && item.subitems.length > 0
            ? convertTOC(item.subitems, level + 1)
            : undefined,
        };
      });
    }

    // ─── Utility ───
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function getVisibleTextSnippet(maxLen) {
      maxLen = maxLen || 80;
      try {
        if (!view || !view.renderer) return '';
        var renderer = view.renderer;
        var contents = renderer.getContents && renderer.getContents();
        if (!contents || !contents[0] || !contents[0].doc) return '';
        var doc = contents[0].doc;
        var win = doc.defaultView;
        if (!win) return '';

        var texts = [];
        var totalLen = 0;

        // Check if we're in paginated mode (CSS columns)
        var isPaginated = !renderer.scrolled;
        var pSize = renderer.size;   // container visible width (one page)
        var pStart = renderer.start; // abs(scrollLeft)

        var walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
            var parent = node.parentElement;
            var tag = parent && parent.tagName && parent.tagName.toLowerCase();
            if (tag === 'script' || tag === 'style') return NodeFilter.FILTER_REJECT;
            if (parent && parent.closest && parent.closest('.readany-translation')) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        var textNode = walker.nextNode();
        while (textNode && totalLen < maxLen) {
          var range = doc.createRange();
          range.selectNodeContents(textNode);
          var rect = range.getBoundingClientRect();
          
          var isVisible = false;
          if (isPaginated && pSize > 0) {
            // In paginated mode, first page starts at scroll offset = pSize
            // So visible range in iframe coords is [start - size, end - size]
            var visibleLeft = pStart - pSize;
            var visibleRight = pStart;
            isVisible = rect.right > visibleLeft && rect.left < visibleRight && rect.width > 0;
          } else {
            // Scrolled mode: use iframe viewport dimensions
            var vw = win.innerWidth;
            var vh = win.innerHeight;
            isVisible = rect.width > 0 && rect.height > 0 &&
                rect.right > 0 && rect.left < vw &&
                rect.bottom > 0 && rect.top < vh;
          }
          
          if (isVisible) {
            var t = textNode.nodeValue.trim();
            if (t) { texts.push(t); totalLen += t.length; }
          }
          textNode = walker.nextNode();
        }
        var result = texts.join(' ').trim();
        return result.length > maxLen ? result.slice(0, maxLen) : result;
      } catch (e) { return ''; }
    }

    // Get all visible text for TTS (no length limit)
    function doGetVisibleText() {
      try {
        if (!view || !view.renderer) {
          return { text: '', error: 'no view or renderer' };
        }
        var renderer = view.renderer;
        var contents = renderer.getContents && renderer.getContents();
        if (!contents || !contents[0] || !contents[0].doc) {
          return { text: '', error: 'no contents or doc' };
        }
        var doc = contents[0].doc;
        var win = doc.defaultView;
        if (!win) {
          return { text: '', error: 'no win' };
        }

        var texts = [];

        // Check if we're in paginated mode (CSS columns)
        var isPaginated = !renderer.scrolled;
        var pSize = renderer.size;   // container visible width (one page)
        var pStart = renderer.start; // abs(scrollLeft)

        var walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
            var parent = node.parentElement;
            var tag = parent && parent.tagName && parent.tagName.toLowerCase();
            if (tag === 'script' || tag === 'style') return NodeFilter.FILTER_REJECT;
            if (parent && parent.closest && parent.closest('.readany-translation')) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        var textNode = walker.nextNode();
        var nodeCount = 0;
        var visibleCount = 0;
        var firstRectInfo = null;
        while (textNode) {
          nodeCount++;
          var range = doc.createRange();
          range.selectNodeContents(textNode);
          var rect = range.getBoundingClientRect();
          
          if (nodeCount === 1) {
            firstRectInfo = { left: rect.left, right: rect.right, width: rect.width };
          }
          
          var isVisible = false;
          if (isPaginated && pSize > 0) {
            // In paginated mode, the iframe is expanded to the full content width.
            // The outer container scrolls to show the current "page".
            // First page starts at scroll offset = pSize (page 0 is padding).
            // So visible range in iframe coords is [start - size, end - size].
            var visibleLeft = pStart - pSize;
            var visibleRight = pStart;
            isVisible = rect.right > visibleLeft && rect.left < visibleRight && rect.width > 0;
          } else {
            // Scrolled mode: use iframe viewport dimensions
            var vw = win.innerWidth;
            var vh = win.innerHeight;
            isVisible = rect.width > 0 && rect.height > 0 &&
                rect.right > 0 && rect.left < vw &&
                rect.bottom > 0 && rect.top < vh;
          }
          
          if (isVisible) {
            visibleCount++;
            var t = textNode.nodeValue.trim();
            if (t) { texts.push(t); }
          }
          textNode = walker.nextNode();
        }
        
        var result = texts.join(' ').trim();
        return { 
          text: result, 
          debug: {
            isPaginated: isPaginated,
            pSize: pSize,
            pStart: pStart,
            nodeCount: nodeCount,
            visibleCount: visibleCount,
            firstRect: firstRectInfo
          }
        };
      } catch (e) { 
        return { text: '', error: String(e) };
      }
    }

    // ─── Expose global functions for injectJavaScript ───
    window.goNext = function () { if (view) view.next(); };
    window.goPrev = function () { if (view) view.prev(); };
    window.goToHref = function (href) { if (view) view.goTo(href); };
    window.goToCFI = function (cfi) { if (view) view.goTo(cfi); };
    window.goToProgress = function (p) { if (view) view.goToFraction(p); };
    window.search = function (q) { handleSearch(q); };
    window.navigateSearch = function (idx) { navigateToSearchResult(idx); };
    window.clearSearch = function () { if (view) view.clearSearch(); searchResults = []; };
    window.setFontSize = function (s) { applySettings({ fontSize: s }); };
    window.setLineHeight = function (lh) { applySettings({ lineHeight: lh }); };
    window.setParagraphSpacing = function (s) { applySettings({ paragraphSpacing: s }); };
    window.setPageMargin = function (m) { applySettings({ pageMargin: m }); };
    window.setFontTheme = function (t) { applySettings({ fontTheme: t }); };
    window.setViewMode = function (m) { applySettings({ viewMode: m }); };
    window.addAnnotation = function (a) { if (view) view.addAnnotation(a); };
    window.removeAnnotation = function (a) { if (view) view.deleteAnnotation(a); };
    
    // Flash highlight for AI citation - temporarily hide existing annotation, show flash, then restore
    window.flashHighlight = async function(cfi, color, duration) {
      if (!view) return;
      const flashColor = color || 'orange';
      const flashDuration = duration || 500;
      
      // Get existing annotation for this CFI
      const existingAnnotation = userAnnotations.get(cfi);
      
      // If there's an existing annotation, temporarily remove it
      if (existingAnnotation) {
        try {
          await view.deleteAnnotation(existingAnnotation);
        } catch (e) {
          console.log('[flashHighlight] error removing existing:', e);
        }
      }
      
      // Add flash highlight
      try {
        await view.addAnnotation({ value: cfi, color: flashColor });
      } catch (e) {
        console.log('[flashHighlight] error adding flash:', e);
        // If flash add fails, restore existing annotation and return
        if (existingAnnotation) {
          try {
            await view.addAnnotation(existingAnnotation);
          } catch (e2) {}
        }
        return;
      }
      
      // Remove flash highlight after duration and restore existing annotation
      setTimeout(async () => {
        try {
          await view.deleteAnnotation({ value: cfi });
        } catch (e) {
          console.log('[flashHighlight] error removing flash:', e);
        }
        
        // Restore existing annotation if there was one
        if (existingAnnotation) {
          try {
            await view.addAnnotation(existingAnnotation);
          } catch (e) {
            console.log('[flashHighlight] error restoring existing:', e);
          }
        }
      }, flashDuration);
    };
    
    window.setNavigationLocked = function (locked) {
      if (view && view.renderer && 'navigationLocked' in view.renderer) {
        view.renderer.navigationLocked = locked;
      }
    };
    window.requestPageSnippet = function () {
      var snippet = getVisibleTextSnippet(80);
      postToRN('bookmarkSnippet', { textSnippet: snippet || '' });
    };
    window.getVisibleText = function () {
      var result = doGetVisibleText();
      return JSON.stringify(result);
    };
    window.doGetChapterParagraphs = function () {
      handleGetChapterParagraphs();
    };
    window.doInjectChapterTranslations = function (results) {
      handleInjectChapterTranslations(results);
    };
    window.doRemoveChapterTranslations = function () {
      handleRemoveChapterTranslations();
    };

    // ─── Polyfills ───
    Object.groupBy ??= function (iterable, fn) {
      const obj = Object.create(null);
      let i = 0;
      for (const v of iterable) { const k = fn(v, i++); if (k in obj) obj[k].push(v); else obj[k] = [v]; }
      return obj;
    };
    Map.groupBy ??= function (iterable, fn) {
      const map = new Map();
      let i = 0;
      for (const v of iterable) { const k = fn(v, i++); const l = map.get(k); if (l) l.push(v); else map.set(k, [v]); }
      return map;
    };

    // ─── Chapter Extraction for Vectorization ───
    async function handleExtractChapters() {
      if (!currentBook) {
        postToRN('chaptersExtracted', { error: 'No book loaded' });
        return;
      }

      try {
        const sections = currentBook.sections || [];
        const toc = currentBook.toc || [];

        // Build map of href to title mapping
        const tocMap = new Map();
        function walkToc(items) {
          for (const item of items) {
            if (item.label) {
              tocMap.set(item.index, item.label);
              if (item.href) {
                const base = item.href.split("#")[0];
                tocMap.set(base, item.label);
                tocMap.set(item.href, item.label);
              }
            }
            if (item.subitems && item.subitems.length) {
              walkToc(item.subitems);
            }
          }
        }
        walkToc(toc);

        const chapters = [];

        for (let i = 0; i < sections.length; i++) {
          const section = sections[i];
          if (!section.createDocument) continue;

          try {
            const doc = await section.createDocument();
            if (!doc.body) continue;

            const title = tocMap.get(i) || tocMap.get(section.href || "") || `Section ${i + 1}`;
            const CFI = window.CFI || (window.EpubCFI && window.EpubCFI.fake ? window.EpubCFI : null);
            let baseCfi = section.cfi;

            // If CFI generation is available but no base cfi, try to fake it
            if (!baseCfi && typeof CFI?.fake?.fromIndex === 'function') {
              baseCfi = CFI.fake.fromIndex(i);
            } else if (!baseCfi) {
              baseCfi = `epubcfi(/6/${(i + 1) * 2}!)`; // Fallback approximate
            }

            const segments = extractSegmentsWithCfi(doc, baseCfi, CFI);
            if (segments.length === 0) continue;

            const content = segments.map(s => s.text).join("\\n\\n");
            chapters.push({ index: i, title, content, segments });

            // Reclaim memory
            doc.documentElement.innerHTML = "";
          } catch (err) {
            console.warn(`[WebView] Failed to extract section ${i}:`, err);
          }
        }

        postToRN('chaptersExtracted', { chapters });
      } catch (err) {
        console.error('[WebView] Error extracting chapters:', err);
        postToRN('chaptersExtracted', { error: String(err) });
      }
    }

    function extractSegmentsWithCfi(doc, baseCfi, CFI) {
      const segments = [];
      const body = doc.body;
      if (!body) return segments;

      const blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
      const blocks = body.querySelectorAll(blockSelector);

      if (blocks.length === 0) {
        const text = body.textContent?.trim();
        if (text) {
          segments.push({ text, cfi: baseCfi });
        }
        return segments;
      }

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        const text = extractBlockText(block);
        if (!text || text.length < 2) continue;

        try {
          if (!CFI) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const textNodes = getTextNodes(block);
          if (textNodes.length === 0) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const range = doc.createRange();
          const firstNode = textNodes[0];
          const lastNode = textNodes[textNodes.length - 1];

          range.setStart(firstNode, 0);
          range.setEnd(lastNode, lastNode.length);

          let rangeCfi = '';
          if (typeof CFI.fromRange === 'function') {
            rangeCfi = CFI.fromRange(range);
          } else if (CFI.Generator && typeof CFI.Generator.generateRangeComponent === 'function') {
            rangeCfi = CFI.Generator.generateRangeComponent(
              range.startContainer, range.startOffset,
              range.endContainer, range.endOffset
            );
          }

          let fullCfi = baseCfi;
          if (rangeCfi) {
            if (typeof CFI.joinIndir === 'function') {
              fullCfi = CFI.joinIndir(baseCfi, rangeCfi);
            } else {
              // naive join epubcfi(/a!) and epubcfi(/b) -> epubcfi(/a!/b)
              fullCfi = baseCfi.replace('!)', '!' + rangeCfi.replace('epubcfi(', ''));
            }
          }

          segments.push({ text, cfi: fullCfi });
        } catch (e) {
          segments.push({ text, cfi: baseCfi });
        }
      }
      return segments;
    }

    // ─── Chapter Translation Handlers ───

    function handleGetChapterParagraphs() {
      try {
        // First try: view.renderer.getContents()
        var doc = null;
        var renderer = view && view.renderer;
        if (renderer && renderer.getContents) {
          var contents = renderer.getContents();
          if (contents && contents.length && contents[0] && contents[0].doc) {
            doc = contents[0].doc;
          }
        }

        // Fallback: scan iframes
        if (!doc) {
          var iframes = document.querySelectorAll('iframe');
          for (var fi = 0; fi < iframes.length; fi++) {
            try {
              var iframeDoc = iframes[fi].contentDocument || (iframes[fi].contentWindow && iframes[fi].contentWindow.document);
              if (iframeDoc && iframeDoc.body && iframeDoc.body.innerText && iframeDoc.body.innerText.trim().length > 0) {
                doc = iframeDoc;
                break;
              }
            } catch (e) { /* cross-origin, skip */ }
          }
        }

        if (!doc) {
          postToRN('chapterParagraphs', { paragraphs: [], error: 'no document found (view=' + !!view + ', renderer=' + !!renderer + ', iframes=' + document.querySelectorAll('iframe').length + ')' });
          return;
        }

        var blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
        var blocks = doc.querySelectorAll(blockSelector);
        var paragraphs = [];
        for (var i = 0; i < blocks.length; i++) {
          var el = blocks[i];
          var text = (el.innerText || el.textContent || '').trim();
          if (text.length < 2) continue;
          var id = 'para_' + i;
          el.setAttribute('data-translate-id', id);
          paragraphs.push({ id: id, text: text, tagName: el.tagName.toLowerCase() });
        }

        postToRN('chapterParagraphs', { paragraphs: paragraphs });
      } catch (err) {
        postToRN('chapterParagraphs', { paragraphs: [], error: String(err) });
      }
    }

    function handleInjectChapterTranslations(results) {
      try {
        var doc = null;
        var renderer = view && view.renderer;
        if (renderer && renderer.getContents) {
          var contents = renderer.getContents();
          if (contents && contents.length && contents[0] && contents[0].doc) {
            doc = contents[0].doc;
          }
        }
        if (!doc) {
          var iframes = document.querySelectorAll('iframe');
          for (var fi = 0; fi < iframes.length; fi++) {
            try {
              var iframeDoc = iframes[fi].contentDocument || (iframes[fi].contentWindow && iframes[fi].contentWindow.document);
              if (iframeDoc && iframeDoc.body) { doc = iframeDoc; break; }
            } catch (e) {}
          }
        }
        if (!doc) return;

        // Inject CSS once
        if (!doc.getElementById('readany-chapter-translation-style')) {
          var style = doc.createElement('style');
          style.id = 'readany-chapter-translation-style';
          style.textContent = [
            '.readany-translation {',
            '  color: #6b7280;',
            '  font-size: 0.9em;',
            '  line-height: 1.5;',
            '  margin-top: 4px;',
            '  margin-bottom: 8px;',
            '  padding-left: 8px;',
            '  border-left: 2px solid #d1d5db;',
            '  opacity: 0.85;',
            '}',
            '.readany-translation[data-hidden="true"] { display: none; }',
            '.readany-translation[data-solo="true"] { color: inherit; font-size: inherit; line-height: inherit; margin-top: 0; margin-bottom: 0.8em; padding-left: 0; border-left: none; opacity: 1; }',
            '[data-translate-id][data-original-hidden="true"] { display: none; }',
            '@media (prefers-color-scheme: dark) {',
            '  .readany-translation { color: #9ca3af; border-left-color: #4b5563; }',
            '}'
          ].join('\n');
          doc.head.appendChild(style);
        }

        for (var i = 0; i < results.length; i++) {
          var r = results[i];
          if (!r.translatedText) continue;
          var el = doc.querySelector('[data-translate-id="' + r.paragraphId + '"]');
          if (!el) continue;
          // Skip if already injected
          if (el.nextElementSibling && el.nextElementSibling.classList.contains('readany-translation')) continue;

          var div = doc.createElement('div');
          div.className = 'readany-translation';
          div.setAttribute('data-para-id', r.paragraphId);
          div.textContent = r.translatedText;
          el.parentNode.insertBefore(div, el.nextSibling);
        }
      } catch (err) {
        console.error('[WebView] Error injecting translations:', err);
      }
    }

    function handleRemoveChapterTranslations() {
      try {
        var doc = null;
        var renderer = view && view.renderer;
        if (renderer && renderer.getContents) {
          var contents = renderer.getContents();
          if (contents && contents.length && contents[0] && contents[0].doc) {
            doc = contents[0].doc;
          }
        }
        if (!doc) {
          var iframes = document.querySelectorAll('iframe');
          for (var fi = 0; fi < iframes.length; fi++) {
            try {
              var iframeDoc = iframes[fi].contentDocument || (iframes[fi].contentWindow && iframes[fi].contentWindow.document);
              if (iframeDoc && iframeDoc.body) { doc = iframeDoc; break; }
            } catch (e) {}
          }
        }
        if (!doc) return;

        var elements = doc.querySelectorAll('.readany-translation');
        for (var i = 0; i < elements.length; i++) {
          elements[i].remove();
        }
        var style = doc.getElementById('readany-chapter-translation-style');
        if (style) style.remove();
      } catch (err) {
        console.error('[WebView] Error removing translations:', err);
      }
    }

    function getTextNodes(element) {
      const walker = element.ownerDocument.createTreeWalker(
        element,
        NodeFilter.SHOW_TEXT,
        null
      );
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) {
        if (node.textContent && node.textContent.trim()) {
          nodes.push(node);
        }
      }
      return nodes;
    }

    function extractBlockText(block) {
      const walker = block.ownerDocument.createTreeWalker(
        block,
        NodeFilter.SHOW_TEXT,
        null
      );
      const texts = [];
      let node;
      while ((node = walker.nextNode())) {
        const text = node.textContent?.trim();
        if (text) texts.push(text);
      }
      return texts.join(" ");
    }
