    // ─── Chapter Extraction for Vectorization ───
    async function handleExtractChapters() {
      if (!currentBook) {
        postToRN('chaptersExtracted', { error: 'No book loaded' });
        return;
      }

      try {
        const sections = currentBook.sections || [];
        const toc = currentBook.toc || [];

        // Build map of href to title mapping
        const tocMap = new Map();
        function walkToc(items) {
          for (const item of items) {
            if (item.label) {
              tocMap.set(item.index, item.label);
              if (item.href) {
                const base = item.href.split("#")[0];
                tocMap.set(base, item.label);
                tocMap.set(item.href, item.label);
              }
            }
            if (item.subitems && item.subitems.length) {
              walkToc(item.subitems);
            }
          }
        }
        walkToc(toc);

        const chapters = [];

        for (let i = 0; i < sections.length; i++) {
          const section = sections[i];
          if (!section.createDocument) continue;

          try {
            const doc = await section.createDocument();
            if (!doc.body) continue;

            const title = tocMap.get(i) || tocMap.get(section.href || "") || `Section ${i + 1}`;
            const CFI = window.CFI || (window.EpubCFI && window.EpubCFI.fake ? window.EpubCFI : null);
            let baseCfi = section.cfi;

            // If CFI generation is available but no base cfi, try to fake it
            if (!baseCfi && typeof CFI?.fake?.fromIndex === 'function') {
              baseCfi = CFI.fake.fromIndex(i);
            } else if (!baseCfi) {
              baseCfi = `epubcfi(/6/${(i + 1) * 2}!)`; // Fallback approximate
            }

            const segments = extractSegmentsWithCfi(doc, baseCfi, CFI);
            if (segments.length === 0) continue;

            const content = segments.map(s => s.text).join("\\n\\n");
            chapters.push({ index: i, title, content, segments });

            // Reclaim memory
            doc.documentElement.innerHTML = "";
          } catch (err) {
            console.warn(`[WebView] Failed to extract section ${i}:`, err);
          }
        }

        postToRN('chaptersExtracted', { chapters });
      } catch (err) {
        console.error('[WebView] Error extracting chapters:', err);
        postToRN('chaptersExtracted', { error: String(err) });
      }
    }

    function extractSegmentsWithCfi(doc, baseCfi, CFI) {
      const segments = [];
      const body = doc.body;
      if (!body) return segments;

      const blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
      const blocks = body.querySelectorAll(blockSelector);

      if (blocks.length === 0) {
        const text = body.textContent?.trim();
        if (text) {
          segments.push({ text, cfi: baseCfi });
        }
        return segments;
      }

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        const text = extractBlockText(block);
        if (!text || text.length < 2) continue;

        try {
          if (!CFI) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const textNodes = getTextNodes(block);
          if (textNodes.length === 0) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const range = doc.createRange();
          const firstNode = textNodes[0];
          const lastNode = textNodes[textNodes.length - 1];

          range.setStart(firstNode, 0);
          range.setEnd(lastNode, lastNode.length);

          let rangeCfi = '';
          if (typeof CFI.fromRange === 'function') {
            rangeCfi = CFI.fromRange(range);
          } else if (CFI.Generator && typeof CFI.Generator.generateRangeComponent === 'function') {
            rangeCfi = CFI.Generator.generateRangeComponent(
              range.startContainer, range.startOffset,
              range.endContainer, range.endOffset
            );
          }

          let fullCfi = baseCfi;
          if (rangeCfi) {
            if (typeof CFI.joinIndir === 'function') {
              fullCfi = CFI.joinIndir(baseCfi, rangeCfi);
            } else {
              // naive join epubcfi(/a!) and epubcfi(/b) -> epubcfi(/a!/b)
              fullCfi = baseCfi.replace('!)', '!' + rangeCfi.replace('epubcfi(', ''));
            }
          }

          segments.push({ text, cfi: fullCfi });
        } catch (e) {
          segments.push({ text, cfi: baseCfi });
        }
      }
      return segments;
    }

    // ─── Chapter Translation Handlers ───

    function handleGetChapterParagraphs() {
      try {
        // First try: view.renderer.getContents()
        var doc = null;
        var renderer = view && view.renderer;
        if (renderer && renderer.getContents) {
          var contents = renderer.getContents();
          if (contents && contents.length && contents[0] && contents[0].doc) {
            doc = contents[0].doc;
          }
        }

        // Fallback: scan iframes
        if (!doc) {
          var iframes = document.querySelectorAll('iframe');
          for (var fi = 0; fi < iframes.length; fi++) {
            try {
              var iframeDoc = iframes[fi].contentDocument || (iframes[fi].contentWindow && iframes[fi].contentWindow.document);
              if (iframeDoc && iframeDoc.body && iframeDoc.body.innerText && iframeDoc.body.innerText.trim().length > 0) {
                doc = iframeDoc;
                break;
              }
            } catch (e) { /* cross-origin, skip */ }
          }
        }

        if (!doc) {
          postToRN('chapterParagraphs', { paragraphs: [], error: 'no document found (view=' + !!view + ', renderer=' + !!renderer + ', iframes=' + document.querySelectorAll('iframe').length + ')' });
          return;
        }

        var blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
        var blocks = doc.querySelectorAll(blockSelector);
        var paragraphs = [];
        for (var i = 0; i < blocks.length; i++) {
          var el = blocks[i];
          var text = (el.innerText || el.textContent || '').trim();
          if (text.length < 2) continue;
          var id = 'para_' + i;
          el.setAttribute('data-translate-id', id);
          paragraphs.push({ id: id, text: text, tagName: el.tagName.toLowerCase() });
        }

        postToRN('chapterParagraphs', { paragraphs: paragraphs });
      } catch (err) {
        postToRN('chapterParagraphs', { paragraphs: [], error: String(err) });
      }
    }

    function handleInjectChapterTranslations(results) {
      try {
        var doc = null;
        var renderer = view && view.renderer;
        if (renderer && renderer.getContents) {
          var contents = renderer.getContents();
          if (contents && contents.length && contents[0] && contents[0].doc) {

          }

        if (!doc) {

              if (iframeDoc && iframeDoc.body) { doc = iframeDoc; break; }
            } catch (e) {}
          }
        }
        if (!doc) return;

        // Inject CSS once
        if (!doc.getElementById('readany-chapter-translation-style')) {
          var style = doc.createElement('style');
          style.id = 'readany-chapter-translation-style';
          style.textContent = [
            '.readany-translation {',
            '  color: #6b7280;',
            '  font-size: 0.9em;',
            '  line-height: 1.5;',
            '  margin-top: 4px;',
            '  margin-bottom: 8px;',
            '  padding-left: 8px;',
            '  border-left: 2px solid #d1d5db;',
            '  opacity: 0.85;',
            '}',
            '.readany-translation[data-hidden="true"] { display: none; }',
            '.readany-translation[data-solo="true"] { color: inherit; font-size: inherit; line-height: inherit; margin-top: 0; margin-bottom: 0.8em; padding-left: 0; border-left: none; opacity: 1; }',
            '[data-translate-id][data-original-hidden="true"] { display: none; }',
            '@media (prefers-color-scheme: dark) {',
            '  .readany-translation { color: #9ca3af; border-left-color: #4b5563; }',
            '}'
          ].join('\n');
          doc.head.appendChild(style);
        }

        for (var i = 0; i < results.length; i++) {
          var r = results[i];
          if (!r.translatedText) continue;
          var el = doc.querySelector('[data-translate-id="' + r.paragraphId + '"]');
          if (!el) continue;
          // Skip if already injected
          if (el.nextElementSibling && el.nextElementSibling.classList.contains('readany-translation')) continue;

          var div = doc.createElement('div');
          div.className = 'readany-translation';
          div.setAttribute('data-para-id', r.paragraphId);
          div.textContent = r.translatedText;
          el.parentNode.insertBefore(div, el.nextSibling);
        }
      } catch (err) {
        console.error('[WebView] Error injecting translations:', err);
      }
    }

    function handleRemoveChapterTranslations() {
      try {
        var doc = null;
        var renderer = view && view.renderer;
        if (renderer && renderer.getContents) {
          var contents = renderer.getContents();
          if (contents && contents.length && contents[0] && contents[0].doc) {
            doc = contents[0].doc;
          }
        }
        if (!doc) {
          var iframes = document.querySelectorAll('iframe');
          for (var fi = 0; fi < iframes.length; fi++) {
            try {
              var iframeDoc = iframes[fi].contentDocument || (iframes[fi].contentWindow && iframes[fi].contentWindow.document);
              if (iframeDoc && iframeDoc.body) { doc = iframeDoc; break; }
            } catch (e) {}
          }
        }
        if (!doc) return;

        var elements = doc.querySelectorAll('.readany-translation');
        for (var i = 0; i < elements.length; i++) {
          elements[i].remove();
        }
        var style = doc.getElementById('readany-chapter-translation-style');
        if (style) style.remove();
      } catch (err) {
        console.error('[WebView] Error removing translations:', err);
      }
    }

    function getTextNodes(element) {
      const walker = element.ownerDocument.createTreeWalker(
        element,
        NodeFilter.SHOW_TEXT,
        null
      );
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) {
        if (node.textContent && node.textContent.trim()) {
          nodes.push(node);
        }
      }
      return nodes;
    }

    function extractBlockText(block) {
      const walker = block.ownerDocument.createTreeWalker(
        block,
        NodeFilter.SHOW_TEXT,
        null
      );
      const texts = [];
      let node;
      while ((node = walker.nextNode())) {
        const text = node.textContent?.trim();
        if (text) texts.push(text);
      }
      return texts.join(" ");
    }
